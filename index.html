<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>cn17 Menu Board</title>
<style>
:root {
  --bg:#f7f1e7; --paper:#fffdf8; --card:#ffffff; --soft:#efe5d4;
  --line:#e0d4bf; --text:#332d25; --muted:#74695a; --accent:#4c8874;
}
* { box-sizing:border-box; }
body {
  margin:0; min-height:100svh; display:grid; place-items:center;
  padding:22px; background:
    radial-gradient(circle at top left, rgba(193,113,47,.13), transparent 34%),
    linear-gradient(180deg,#faf4ea 0%,var(--bg) 58%,#f1e8d9 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
}
.login {
  width:min(420px,100%);
  background:rgba(255,253,248,.92);
  border:1px solid var(--line);
  border-radius:26px;
  box-shadow:0 18px 45px rgba(58,51,43,.10);
  padding:24px;
}
.kicker {
  font-size:11px; color:var(--muted); font-weight:800; letter-spacing:.1em;
  text-transform:uppercase; margin-bottom:8px;
}
h1 { margin:0 0 8px; font-size:31px; line-height:1; letter-spacing:-.055em; }
p { margin:0 0 18px; color:var(--muted); line-height:1.45; font-size:14px; }
input {
  width:100%; border:1px solid var(--line); background:white; color:var(--text);
  border-radius:16px; padding:14px 15px; font-size:16px; outline:none;
}
input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(76,136,116,.13); }
button {
  width:100%; margin-top:12px; border:0; border-radius:16px; padding:14px 16px;
  background:var(--text); color:#fffdf8; font-weight:800; font-size:15px;
}
.status { margin-top:12px; min-height:18px; color:#9b3d27; font-size:13px; }
.small { margin-top:16px; font-size:12px; color:#9f927f; }
</style>
</head>
<body>
<section class="login">
  <div class="kicker">Protected menu board</div>
  <h1>Passwort</h1>
  <p>Gib das App-Passwort ein, um den Wochenplan zu öffnen.</p>
  <form id="form">
    <input id="pw" type="password" autocomplete="current-password" placeholder="Passwort" autofocus>
    <button type="submit">Öffnen</button>
  </form>
  <div id="status" class="status"></div>
  <div class="small">Die App-Inhalte sind in dieser Datei verschlüsselt. Ohne Passwort wird nur diese Startseite angezeigt.</div>
</section>

function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function deriveKey(password, salt, iterations) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name:"PBKDF2", salt, iterations, hash:"SHA-256" },
    baseKey,
    { name:"AES-GCM", length:256 },
    false,
    ["decrypt"]
  );
}

async function unlock(password) {
  const salt = b64ToBytes(PAYLOAD.salt);
  const iv = b64ToBytes(PAYLOAD.iv);
  const data = b64ToBytes(PAYLOAD.data);
  const key = await deriveKey(password, salt, PAYLOAD.iterations);
  const plain = await crypto.subtle.decrypt({ name:"AES-GCM", iv }, key, data);
  const html = new TextDecoder().decode(plain);
  document.open();
  document.write(html);
  document.close();
}

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const status = document.getElementById("status");
  status.textContent = "Öffne …";
  try {
    await unlock(document.getElementById("pw").value);
  } catch (err) {
    status.textContent = "Passwort falsch oder Datei beschädigt.";
  }
});
</script>
