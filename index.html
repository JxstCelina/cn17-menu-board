<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>cn17 Menu Board</title>
<style>
:root{
  --bg:#f7f1e7;
  --paper:#fffdf8;
  --card:#ffffff;
  --soft:#efe5d4;
  --soft2:#f7eadb;
  --line:#e0d4bf;
  --text:#332d25;
  --muted:#74695a;
  --faint:#a79b89;
  --tiger:#c1712f;
  --tiger-soft:#f3dfc8;
  --maus:#4c8874;
  --maus-soft:#dceae2;
  --shadow:0 12px 30px rgba(58,51,43,.08);
  --r:22px;
  --r2:15px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:
    radial-gradient(circle at top left, rgba(193,113,47,.12), transparent 34%),
    linear-gradient(180deg,#faf4ea 0%,var(--bg) 56%,#f1e8d9 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
  line-height:1.42;
  -webkit-font-smoothing:antialiased;
}
button,input{font:inherit}
button{cursor:pointer}
.app{
  max-width:520px;
  min-height:100svh;
  margin:0 auto;
  padding:18px 14px calc(86px + env(safe-area-inset-bottom));
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin:6px 2px 18px;
}
.brand small{
  color:var(--muted);
  font-weight:650;
  letter-spacing:.08em;
  text-transform:uppercase;
  font-size:11px;
}
.brand h1{
  margin:3px 0 0;
  font-size:29px;
  line-height:1.02;
  letter-spacing:-.05em;
}
.week-pill{
  background:rgba(255,255,255,.74);
  border:1px solid var(--line);
  border-radius:999px;
  padding:9px 12px;
  color:var(--muted);
  font-size:12px;
  box-shadow:0 6px 18px rgba(58,51,43,.05);
  white-space:nowrap;
}
.page{display:none}
.page.active{display:block}
.hero{
  background:linear-gradient(135deg,rgba(255,255,255,.9),rgba(255,250,242,.86));
  border:1px solid rgba(224,212,191,.9);
  border-radius:var(--r);
  padding:18px;
  box-shadow:var(--shadow);
  margin-bottom:14px;
}
.hero .kicker{font-size:12px;color:var(--muted);font-weight:750;text-transform:uppercase;letter-spacing:.08em}
.hero h2{font-size:26px;letter-spacing:-.04em;line-height:1.05;margin:6px 0}
.hero p{font-size:14px;color:var(--muted);margin:0}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px}
.chip{
  border:1px solid var(--line);
  border-radius:999px;
  padding:7px 10px;
  background:rgba(255,255,255,.72);
  color:var(--muted);
  font-size:12px;
  font-weight:650;
}
.chip.tiger{background:var(--tiger-soft);color:#8b4c19;border-color:#eccda9}
.chip.maus{background:var(--maus-soft);color:#2f6959;border-color:#c5ddcf}
.section-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:20px 2px 10px;
}
.section-title h3{margin:0;font-size:17px;letter-spacing:-.02em}
.section-title span{color:var(--muted);font-size:12px}
.meal-grid{display:grid;gap:12px}
.meal-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--r);
  overflow:hidden;
  box-shadow:0 8px 20px rgba(58,51,43,.055);
}
.food-img{
  height:118px;
  position:relative;
  display:flex;
  align-items:flex-end;
  padding:13px;
  overflow:hidden;
  background:
    radial-gradient(circle at 80% 20%, rgba(255,255,255,.55), transparent 25%),
    linear-gradient(135deg,var(--tiger-soft),var(--maus-soft));
}
.food-img:before{
  content:"";
  position:absolute;
  inset:auto -20px -46px -20px;
  height:96px;
  border-radius:50%;
  background:rgba(255,255,255,.38);
}
.food-img .plate{
  position:absolute;
  width:170px;height:78px;
  border-radius:50%;
  right:-20px;bottom:12px;
  background:rgba(255,255,255,.52);
  border:1px solid rgba(255,255,255,.5);
  transform:rotate(-8deg);
}
.food-img .food-dot{
  position:absolute;border-radius:50%;opacity:.9;
  box-shadow:0 6px 14px rgba(58,51,43,.12);
}
.food-img .a{width:54px;height:54px;background:#f5b06d;right:96px;bottom:40px}
.food-img .b{width:42px;height:42px;background:#80b99b;right:63px;bottom:55px}
.food-img .c{width:34px;height:34px;background:#f7d98d;right:34px;bottom:38px}
.food-img .img-label{
  position:relative;
  z-index:1;
  background:rgba(255,253,248,.78);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.65);
  border-radius:999px;
  padding:7px 10px;
  color:var(--muted);
  font-size:12px;
  font-weight:750;
}
.meal-body{padding:14px}
.meal-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  margin-bottom:10px;
}
.meal-head h4{margin:0;font-size:19px;letter-spacing:-.035em;line-height:1.08}
.meal-type{font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.portion-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin:10px 0 12px;
}
.portion{
  border-radius:14px;
  padding:10px;
  background:var(--soft2);
  min-height:62px;
}
.portion strong{display:block;font-size:12px;margin-bottom:3px}
.portion.tiger strong{color:#8b4c19}
.portion.maus strong{color:#2f6959}
.portion span{font-size:12px;color:var(--muted)}
.recipe-btn,.primary-btn,.copy-all{
  width:100%;
  border:0;
  border-radius:15px;
  padding:12px 14px;
  background:var(--text);
  color:#fffdf8;
  font-weight:800;
  font-size:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.recipe-btn.secondary{
  background:var(--soft);
  color:var(--text);
  border:1px solid var(--line);
}
.macro-line{
  margin-top:9px;
  color:var(--faint);
  font-size:12px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.week-list,.shopping-list,.prep-list,.recipe-list{display:grid;gap:10px}
.week-card,.prep-card,.recipe-card,.info-card{
  background:rgba(255,255,255,.82);
  border:1px solid var(--line);
  border-radius:var(--r2);
  padding:14px;
  box-shadow:0 6px 16px rgba(58,51,43,.04);
}
.week-card{display:grid;grid-template-columns:54px 1fr auto;gap:12px;align-items:center}
.week-date b{display:block;font-size:16px}
.week-date span{display:block;color:var(--muted);font-size:12px}
.week-meals{font-size:13px;color:var(--muted)}
.week-meals strong{display:block;color:var(--text);font-size:15px;margin-bottom:2px}
.badge{
  border-radius:999px;
  padding:6px 9px;
  background:var(--soft);
  color:var(--muted);
  font-size:11px;
  font-weight:800;
}
.category{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--r);
  overflow:hidden;
}
.category-head{
  padding:14px 15px;
  background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(250,245,237,.9));
  border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
}
.category-head h4{margin:0;font-size:15px}
.category-head span{color:var(--muted);font-size:12px}
.shop-item{
  display:grid;
  grid-template-columns:1fr 44px;
  gap:10px;
  align-items:center;
  padding:13px 15px;
  border-bottom:1px solid rgba(224,212,191,.68);
}
.shop-item:last-child{border-bottom:0}
.shop-name{font-weight:720;font-size:14px}
.shop-note{font-size:12px;color:var(--muted);margin-top:2px}
.copy-btn{
  width:38px;height:38px;
  border-radius:13px;
  border:1px solid var(--line);
  background:var(--soft2);
  color:var(--text);
  font-size:16px;
  display:grid;place-items:center;
}
.copy-btn.done{background:var(--maus);color:white;border-color:var(--maus)}
.toast{
  position:fixed;
  left:50%;
  bottom:calc(82px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(16px);
  opacity:0;
  pointer-events:none;
  background:rgba(51,45,37,.92);
  color:#fff;
  border-radius:999px;
  padding:10px 14px;
  font-size:13px;
  font-weight:750;
  z-index:80;
  transition:.22s ease;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.prep-card h4,.recipe-card h4,.info-card h4{margin:0 0 6px;font-size:16px}
.prep-card p,.recipe-card p,.info-card p{margin:0;color:var(--muted);font-size:13px}
.recipe-card{display:grid;grid-template-columns:68px 1fr;gap:12px;align-items:center;cursor:pointer}
.recipe-thumb{height:62px;border-radius:16px;background:linear-gradient(135deg,var(--tiger-soft),var(--maus-soft));position:relative;overflow:hidden}
.recipe-thumb:after{content:"";position:absolute;width:54px;height:54px;border-radius:50%;right:-12px;bottom:8px;background:rgba(255,255,255,.6)}
.recipe-card small{color:var(--muted)}
.tabbar{
  position:fixed;
  left:0;right:0;bottom:0;
  z-index:40;
  padding:8px 10px calc(8px + env(safe-area-inset-bottom));
  background:rgba(255,253,248,.92);
  backdrop-filter:blur(18px);
  border-top:1px solid var(--line);
  display:flex;
  justify-content:center;
}
.tabbar-inner{
  width:min(520px,100%);
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:4px;
}
.tabbar button{
  border:0;background:transparent;color:var(--muted);
  border-radius:15px;
  padding:8px 2px;
  font-size:11px;
  font-weight:750;
}
.tabbar button.active{
  background:var(--text);
  color:#fffdf8;
}
.modal{
  position:fixed;inset:0;
  background:var(--bg);
  z-index:100;
  overflow:auto;
  transform:translateX(105%);
  transition:transform .24s ease;
}
.modal.open{transform:translateX(0)}
.recipe-page{
  max-width:620px;
  margin:0 auto;
  min-height:100svh;
  padding:0 0 32px;
  background:var(--paper);
}
.recipe-hero{
  min-height:265px;
  padding:16px 16px 20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:
    radial-gradient(circle at 70% 36%,rgba(255,255,255,.52),transparent 25%),
    linear-gradient(135deg,var(--tiger-soft),var(--maus-soft));
  position:relative;
  overflow:hidden;
}
.recipe-hero:after{
  content:"";
  position:absolute;
  width:330px;height:145px;border-radius:50%;
  right:-82px;bottom:18px;
  background:rgba(255,253,248,.45);
  transform:rotate(-10deg);
}
.modal-top{
  position:relative;z-index:1;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.back{
  border:0;background:rgba(255,253,248,.78);
  color:var(--text);
  border-radius:999px;
  padding:10px 13px;
  font-weight:800;
  box-shadow:0 8px 22px rgba(58,51,43,.08);
}
.print-btn{
  border:0;background:rgba(255,253,248,.55);
  color:var(--muted);
  border-radius:999px;
  padding:10px 12px;
  font-weight:800;
}
.recipe-title{
  position:relative;z-index:1;
  max-width:85%;
}
.recipe-title small{
  color:rgba(51,45,37,.65);
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  font-weight:900;
}
.recipe-title h2{
  margin:5px 0 0;
  font-size:36px;
  line-height:.98;
  letter-spacing:-.06em;
}
.recipe-food-art{
  position:absolute;right:18px;bottom:28px;
  width:150px;height:86px;border-radius:50%;
  background:rgba(255,253,248,.58);
  border:1px solid rgba(255,255,255,.6);
  transform:rotate(-8deg);
  z-index:0;
}
.recipe-food-art span{position:absolute;border-radius:50%}
.recipe-food-art .x{width:56px;height:56px;background:#f5b06d;left:22px;top:13px}
.recipe-food-art .y{width:42px;height:42px;background:#80b99b;left:67px;top:20px}
.recipe-food-art .z{width:32px;height:32px;background:#f7d98d;left:105px;top:29px}
.recipe-content{padding:16px}
.meta-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-top:-34px;
  position:relative;z-index:2;
}
.meta{
  background:rgba(255,255,255,.9);
  border:1px solid var(--line);
  border-radius:15px;
  padding:10px 6px;
  text-align:center;
  box-shadow:0 8px 20px rgba(58,51,43,.06);
}
.meta b{display:block;font-size:13px}
.meta span{display:block;font-size:10px;color:var(--muted);margin-top:2px}
.recipe-section{
  margin-top:14px;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--r);
  padding:16px;
}
.recipe-section h3{margin:0 0 10px;font-size:18px;letter-spacing:-.025em}
.ingredients{display:grid;gap:7px;padding:0;margin:0;list-style:none}
.ingredients li{
  padding:9px 10px;
  background:var(--soft2);
  border-radius:12px;
  font-size:14px;
}
.duo-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.duo-box{
  background:var(--soft2);
  border-radius:15px;
  padding:12px;
}
.duo-box h4{margin:0 0 8px;font-size:14px}
.duo-box ul{margin:0;padding-left:18px;color:var(--muted);font-size:13px}
.steps{display:grid;gap:10px;padding:0;margin:0;list-style:none;counter-reset:step}
.steps li{
  counter-increment:step;
}
.step-label{
  display:grid;
  grid-template-columns:32px 1fr;
  gap:10px;
  align-items:start;
  padding:12px;
  border:1px solid rgba(224,212,191,.85);
  border-radius:16px;
  background:#fffdf9;
}
.step-label input{
  width:22px;height:22px;margin:1px 0 0;accent-color:var(--maus);
}
.step-text:before{
  content:counter(step) ". ";
  font-weight:900;
  color:var(--tiger);
}
.step-label input:checked+.step-text{
  color:var(--faint);
  text-decoration:line-through;
}
.callout{
  border-radius:16px;
  padding:13px;
  background:linear-gradient(135deg,var(--maus-soft),#eef6ed);
  color:#315c50;
  font-size:14px;
}
.callout.orange{background:linear-gradient(135deg,var(--tiger-soft),#fff2df);color:#744313}
.print-note{display:none}
@media (min-width:700px){
  .app{padding-top:28px}
  .food-img{height:140px}
}
@media print{
  body{background:white}
  .app,.tabbar,.modal-top,.toast{display:none!important}
  .modal{position:static;transform:none;overflow:visible;background:white}
  .modal:not(.open){display:none}
  .recipe-page{max-width:780px;background:white}
  .recipe-hero{min-height:220px}
  .recipe-section{break-inside:avoid}
  .print-note{display:block}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <small>cn17 menu board</small>
      <h1>Wochenplan</h1>
    </div>
    <div class="week-pill">06.–12.07.</div>
  </div>

  <main id="page-heute" class="page active"></main>
  <main id="page-woche" class="page"></main>
  <main id="page-einkauf" class="page"></main>
  <main id="page-prep" class="page"></main>
  <main id="page-mehr" class="page"></main>
</div>

<div id="recipeModal" class="modal" aria-hidden="true">
  <article class="recipe-page">
    <section class="recipe-hero">
      <div class="modal-top">
        <button class="back" onclick="closeRecipe()">← Zurück</button>
        <button class="print-btn" onclick="window.print()">Drucken</button>
      </div>
      <div class="recipe-title">
        <small id="modalKind">Rezept</small>
        <h2 id="modalTitle"></h2>
      </div>
      <div class="recipe-food-art" aria-hidden="true"><span class="x"></span><span class="y"></span><span class="z"></span></div>
    </section>
    <section class="recipe-content" id="modalContent"></section>
  </article>
</div>

<nav class="tabbar">
  <div class="tabbar-inner">
    <button class="active" data-tab="heute">Heute</button>
    <button data-tab="woche">Woche</button>
    <button data-tab="einkauf">Einkauf</button>
    <button data-tab="prep">Prep</button>
    <button data-tab="mehr">Mehr</button>
  </div>
</nav>

<div id="toast" class="toast">Kopiert</div>

<script>
const profiles = {
  tiger:{label:"Tiger", kcal:2300, protein:160, accent:"tiger"},
  maus:{label:"Maus", kcal:1900, protein:105, accent:"maus"}
};

const recipes = {
  oats:{
    title:"Overnight Oats",
    type:"Frühstück",
    time:"8 Min + Nacht",
    effort:"Sehr einfach",
    servings:"2",
    devices:"Glas/Schüssel",
    imagePrompt:"professionelles Food-Foto von cremigen Overnight Oats mit Beeren, Banane und Zimt, helles natürliches Licht, moderner Kochbuchstil",
    ingredients:["Haferflocken 80 g","Whey Protein 40 g","Chiasamen 15 g","Milch fettarm 180 ml","Magerquark 120 g","TK-Heidelbeeren 160 g","Banane 1 Stück","Zimt 1/2 TL"],
    tiger:["50 g Haferflocken","30 g Whey","10 g Chia","100 ml Milch","70 g Magerquark","100 g Beeren","1/2 Banane"],
    maus:["30 g Haferflocken","10 g Whey","5 g Chia","80 ml Milch","50 g Magerquark","60 g Beeren","1/2 Banane"],
    seasoning:"Zimt, optional etwas Vanille oder Chunky Flavor.",
    steps:[
      "Haferflocken, Proteinpulver und Chiasamen in zwei Gläser aufteilen.",
      "Milch und Magerquark dazugeben und gründlich verrühren, bis keine Protein-Klümpchen mehr sichtbar sind.",
      "TK-Beeren oben draufgeben. Banane erst morgens frisch schneiden oder direkt untermischen.",
      "Über Nacht im Kühlschrank ziehen lassen.",
      "Morgens umrühren. Wenn es zu fest ist, 20–40 ml Wasser oder Milch dazugeben."
    ],
    done:"Fertig, wenn die Masse cremig ist und die Haferflocken weich sind.",
    prep:"Hält 1–2 Tage im Kühlschrank.",
    low:"Als schnelle Bowl: alles direkt verrühren, Beeren 30 Sekunden antauen lassen."
  },
  skyr:{
    title:"Skyr Shake",
    type:"Frühstück",
    time:"5 Min",
    effort:"Sehr einfach",
    servings:"2",
    devices:"Mixer oder Schüssel",
    imagePrompt:"professionelles Food-Foto eines Heidelbeer-Skyr-Shakes mit Banane und Haferflocken, hell, cremig, Kochbuchstil",
    ingredients:["Skyr natur 250 g","Heidelbeer-Skyr 150 g","TK-Heidelbeeren 160 g","Banane 1 Stück","Haferflocken 40 g","neutrales Proteinpulver 20 g","Wasser 240 ml","Zimt 1/2 TL"],
    tiger:["150 g Skyr natur","100 g Heidelbeer-Skyr","80 g TK-Heidelbeeren","1/2 Banane","20 g Haferflocken","10 g Protein","130 ml Wasser"],
    maus:["100 g Skyr natur","50 g Heidelbeer-Skyr","80 g TK-Heidelbeeren","1/2 Banane","20 g Haferflocken","10 g Protein","110 ml Wasser"],
    seasoning:"Zimt. Bei Bedarf etwas Süße/Vanille.",
    steps:[
      "TK-Heidelbeeren 5 Minuten antauen lassen oder 20 Sekunden in die Mikrowelle geben.",
      "Skyr, Beeren, Banane, Haferflocken, Proteinpulver, Wasser und Zimt in den Mixer geben.",
      "30–45 Sekunden mixen, bis alles cremig ist.",
      "Wenn der Shake zu dick ist, 20–40 ml Wasser dazugeben und nochmal kurz mixen.",
      "Direkt trinken oder als Bowl mit Löffel essen."
    ],
    done:"Cremig, leicht dickflüssig, keine Protein-Klümpchen.",
    prep:"Direkt am besten. Maximal 1 Tag gekühlt.",
    low:"Ohne Mixer: als Bowl rühren und Beeren nur antauen."
  },
  sriracha:{
    title:"Sriracha Reis-Bowl",
    type:"Lunch/Dinner",
    time:"25 Min",
    effort:"Einfach",
    servings:"2",
    devices:"Airfryer + Reiskocher",
    imagePrompt:"professionelles Food-Foto einer Reis-Bowl mit Hähnchen, Brokkoli, Paprika, Gurke, Sesam und Sriracha-Mayo, natürliches Licht",
    ingredients:["Hähnchenbrust 450 g","Basmatireis 280 g trocken","Brokkoli 1 Stück","Paprika rot 1 Stück","Gurke 1/2 Stück","Sriracha 2 TL","Mayonnaise 2 EL","Sesam 2 TL","Salz, Pfeffer, Paprika edelsüß"],
    tiger:["150 g Hähnchen","250 g gekochter Reis","viel Gemüse","1 EL Sriracha-Mayo"],
    maus:["100 g Hähnchen","180–200 g gekochter Reis","viel Gemüse","1–2 TL Sriracha-Mayo"],
    seasoning:"Hähnchen: Salz, Pfeffer, Paprika edelsüß, optional Knoblauchpulver. Sauce: Mayo + Sriracha + 1 TL Wasser.",

  document.getElementById("modalKind").textContent = kind || rec.type;

  const stepKey = "steps_"+id;
  const saved = JSON.parse(localStorage.getItem(stepKey)||"[]");
  document.getElementById("modalContent").innerHTML = `
    <div class="meta-grid">
      <div class="meta"><b>${rec.time}</b><span>Dauer</span></div>
      <div class="meta"><b>${rec.effort}</b><span>Aufwand</span></div>
      <div class="meta"><b>${rec.servings}</b><span>Portionen</span></div>
      <div class="meta"><b>${rec.devices.split(" ")[0]}</b><span>Gerät</span></div>
    </div>
    <section class="recipe-section">
      <h3>Zutaten gesamt</h3>
      <ul class="ingredients">${rec.ingredients.map(x=>`<li>${x}</li>`).join("")}</ul>
    </section>
    <section class="recipe-section">
      <h3>Portionen</h3>
      <div class="duo-cols">
        <div class="duo-box"><h4>Tiger</h4><ul>${rec.tiger.map(x=>`<li>${x}</li>`).join("")}</ul></div>
        <div class="duo-box"><h4>Maus</h4><ul>${rec.maus.map(x=>`<li>${x}</li>`).join("")}</ul></div>
      </div>
    </section>
    <section class="recipe-section">
      <h3>Gewürze & Sauce</h3>
      <p>${rec.seasoning}</p>
    </section>
    <section class="recipe-section">
      <h3>Schritt für Schritt</h3>
      <ol class="steps">${rec.steps.map((s,i)=>`<li><label class="step-label"><input type="checkbox" ${saved.includes(i)?"checked":""} onchange="saveStep('${id}',${i},this.checked)"><span class="step-text">${s}</span></label></li>`).join("")}</ol>
    </section>
    <section class="recipe-section"><h3>Fertigkeitscheck</h3><div class="callout">${rec.done}</div></section>
    <section class="recipe-section"><h3>Meal-Prep</h3><div class="callout orange">${rec.prep}</div></section>
    <section class="recipe-section"><h3>Low Effort</h3><p>${rec.low}</p></section>
    <p class="print-note">KI-Bildprompt: ${rec.imagePrompt}</p>`;
  document.getElementById("recipeModal").classList.add("open");
  document.getElementById("recipeModal").setAttribute("aria-hidden","false");
}
function closeRecipe(){
  document.getElementById("recipeModal").classList.remove("open");
  document.getElementById("recipeModal").setAttribute("aria-hidden","true");
}
function saveStep(id,i,checked){
  const key="steps_"+id;
  let arr=JSON.parse(localStorage.getItem(key)||"[]");
  if(checked && !arr.includes(i)) arr.push(i);
  if(!checked) arr=arr.filter(x=>x!==i);
  localStorage.setItem(key,JSON.stringify(arr));
}
async function copyItem(btn,text){
  try{
    await navigator.clipboard.writeText(text);
    btn.classList.add("done"); btn.textContent="✓";
    showToast("Kopiert: "+text);
    setTimeout(()=>{btn.classList.remove("done");btn.textContent="⧉"},900);
  }catch(e){showToast("Kopieren nicht erlaubt")}
}
async function copyAll(){
  const text=shopping.flatMap(g=>g.items).join("\\n");
  try{await navigator.clipboard.writeText(text);showToast("Alle Artikel kopiert")}catch(e){showToast("Kopieren nicht erlaubt")}
}
function showToast(t){
  const el=document.getElementById("toast");
  el.textContent=t;
  el.classList.add("show");
  clearTimeout(window.toastTimer);
  window.toastTimer=setTimeout(()=>el.classList.remove("show"),1500);
}
function showTab(tab){
  document.querySelectorAll(".page").forEach(p=>p.classList.toggle("active",p.id==="page-"+tab));
  document.querySelectorAll(".tabbar button").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  if(tab==="heute") renderHeute();
  if(tab==="woche") renderWoche();
  if(tab==="einkauf") renderEinkauf();
  if(tab==="prep") renderPrep();
  if(tab==="mehr") renderMehr();
  window.scrollTo({top:0,behavior:"smooth"});
}
document.querySelectorAll(".tabbar button").forEach(b=>b.addEventListener("click",()=>showTab(b.dataset.tab)));
renderHeute(); renderWoche(); renderEinkauf(); renderPrep(); renderMehr();
</script>
</body>
</html>
